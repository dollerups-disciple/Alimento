<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alimento</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="productlist.css" />
    <script src="js-2/grocerylist.js" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="icon">
          <svg viewBox="0 0 24 24">
            <path d="M6 9l6-7 6 7"></path>
            <path d="M3 9h18l-2 11H5L3 9z"></path>
          </svg>
        </div>


        <div class="icon">⌕</div>
      </header>

      <section class="hero">
        <h1><a href="index.html">ALIMENTO</a></h1>
        <h2>Where taste matters</h2>
        <img
          src="https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=1200&q=80"
          alt="mad"
        />
      </section>

      <section>
        <h3>Choose Your Food</h3>

        <section
          class="controls"
          style="margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap"
        >
          <div class="filter-group">
            <button class="filter-btn" data-category="all">Show All</button>
            <button class="filter-btn" data-category="fruits">Fruits</button>
            <button class="filter-btn" data-category="meat">Meat</button>
          </div>

          <div class="sort-group">
            <select id="price-sort">
              <option value="default">Sort by price</option>
              <option value="low">Price: Low to High</option>
              <option value="high">Price: High to Low</option>
            </select>
          </div>
        </section>

       
</section>

        <div class="cards"></div>
      </section>

       <section class="suggestion-section">
  <h3>Didn't Find What You Were Looking For?</h3>
  <p>Help us improve Alimento by suggesting a new product.</p>

<form id="product-suggestion" action="thanks.html" method="GET">
  
  <div class="form-group">
    <label for="user-name">Your Name:</label>
    <input 
      type="text" 
      id="user-name" 
      name="fullname" 
      required 
      minlength="2" 
      placeholder="Type in your name"
    >
  </div>

  <div class="form-group">
    <label for="user-email">Email:</label>
    <input 
      type="email" 
      id="user-email" 
      name="email" 
      required 
      placeholder="your@email.com"
    >
  </div>

  <div class="form-group">
    <label for="product-name">Produktforslag:</label>
    <input 
      type="text" 
      id="product-name" 
      name="item" 
      required 
      placeholder="For example, fresh figs"
    >
  </div>

  <div class="form-group">
    <label for="category">Category:</label>
    <select id="category" name="category" required>
      <option value="">Select a category...</option> <option value="fruits">Fruits & vegetables</option>
      <option value="meat">Meat & fish</option>
      <option value="snacks">Snacks</option>
      <option value="nonfood">Drinks</option>
    </select>
  </div>

  <button type="submit" class="submit-btn">Send suggestion</button>
</form>
    </main>
  </body>
</html>
